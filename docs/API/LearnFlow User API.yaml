openapi: 3.0.3
info:
  title: LearnFlow API
  version: 1.0.0
  description: Online learning platform — REST API documentation
paths:
  /api/v1/auth/login/:
    post:
      operationId: auth_login_create
      description: Authenticate with email + password. Returns a short-lived access
        token (15 min, RS256 JWT) and a long-lived refresh token (30 days). Enforces
        account lockout after 5 failed attempts.
      summary: Login
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '
            examples:
              LoginRequest:
                value:
                  email: student@example.com
                  password: SecurePass123!
                summary: Login request
          multipart/form-data:
            schema:
              $ref: '
        required: true
      security:
      - BearerAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '
              examples:
                LoginSuccess:
                  value:
                    access_token: eyJhbGc...
                    refresh_token: dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4...
                    token_type: Bearer
                  summary: Login success
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  code:
                    type: string
          description: ''
  /api/v1/auth/logout/:
    post:
      operationId: auth_logout_create
      description: Revokes the provided refresh token. Access token expires naturally.
      summary: Logout (revoke refresh token)
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '
          multipart/form-data:
            schema:
              $ref: '
        required: true
      security:
      - BearerAuth: []
      - BearerAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/auth/logout/all/:
    post:
      operationId: auth_logout_all_create
      description: Revokes all active refresh tokens for the authenticated user.
      summary: Logout from all devices
      tags:
      - Auth
      security:
      - BearerAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  revoked:
                    type: integer
          description: ''
  /api/v1/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: 'Returns full profile: identity, info, settings, and active roles.'
      summary: Get current user profile
      tags:
      - User — Profile
      security:
      - BearerAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '
          description: ''
    patch:
      operationId: auth_me_partial_update
      description: Partially updates UserInfo fields (first_name, last_name, phone,
        bio, date_of_birth).
      summary: Update profile info
      tags:
      - User — Profile
      requestBody:
        content:
          application/json:
            schema:
              $ref: '
          multipart/form-data:
            schema:
              $ref: '
      security:
      - BearerAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '
          description: ''
  /api/v1/auth/me/password/:
    post:
      operationId: auth_me_password_create
      description: Requires current password. Revokes all sessions after success.
      summary: Change password
      tags:
      - User — Profile
      requestBody:
        content:
          application/json:
            schema:
              $ref: '
          multipart/form-data:
            schema:
              $ref: '
        required: true
      security:
      - BearerAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
        '400':
          description: No response body
  /api/v1/auth/me/sessions/:
    get:
      operationId: auth_me_sessions_list
      description: Returns all non-revoked, non-expired refresh tokens for the user.
      summary: List active sessions
      tags:
      - User — Sessions
      security:
      - BearerAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '
          description: ''
  /api/v1/auth/me/sessions/{session_id}/:
    delete:
      operationId: auth_me_sessions_destroy
      description: Revoke a refresh token by its UUID. Must belong to the authenticated
        user.
      summary: Revoke a specific session
      parameters:
      - in: path
        name: session_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - User — Sessions
      security:
      - BearerAuth: []
      - BearerAuth: []
      responses:
        '204':
          description: No response body
        '404':
          description: No response body
  /api/v1/auth/me/settings/:
    get:
      operationId: auth_me_settings_retrieve
      summary: Get user settings
      tags:
      - User — Settings
      security:
      - BearerAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '
          description: ''
    patch:
      operationId: auth_me_settings_partial_update
      summary: Update user settings
      tags:
      - User — Settings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '
          multipart/form-data:
            schema:
              $ref: '
      security:
      - BearerAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '
          description: ''
  /api/v1/auth/password-reset/:
    post:
      operationId: auth_password_reset_create
      description: Sends a reset link to the email. Always returns 200 to prevent
        email enumeration.
      summary: Request password reset email
      tags:
      - Auth — Password Reset
      requestBody:
        content:
          application/json:
            schema:
              $ref: '
          multipart/form-data:
            schema:
              $ref: '
        required: true
      security:
      - BearerAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
  /api/v1/auth/password-reset/confirm/:
    post:
      operationId: auth_password_reset_confirm_create
      description: Reset password using the token from the email link. Revokes ALL
        active sessions after a successful reset.
      summary: Confirm password reset
      tags:
      - Auth — Password Reset
      requestBody:
        content:
          application/json:
            schema:
              $ref: '
          multipart/form-data:
            schema:
              $ref: '
        required: true
      security:
      - BearerAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
        '400':
          description: No response body
  /api/v1/auth/register/:
    post:
      operationId: auth_register_create
      description: Creates a new user account (inactive until email is verified).
        Sends a verification email asynchronously via Celery.
      summary: Register a new user
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '
            examples:
              RegisterRequest:
                value:
                  email: student@example.com
                  password: SecurePass123!
                  first_name: Alisher
                  last_name: Umarov
                summary: Register request
          multipart/form-data:
            schema:
              $ref: '
        required: true
      security:
      - BearerAuth: []
      - BearerAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
          description: ''
  /api/v1/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: Exchange a valid refresh token for a new access token + rotated
        refresh token. The old refresh token is immediately revoked. If a revoked
        token is presented, ALL sessions are revoked (theft detection).
      summary: Refresh access token
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '
          multipart/form-data:
            schema:
              $ref: '
        required: true
      security:
      - BearerAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '
          description: ''
        '401':
          description: No response body
  /api/v1/auth/verify-email/:
    get:
      operationId: auth_verify_email_retrieve
      description: Activates the account using the token from the verification email
        link.
      summary: Verify email address
      parameters:
      - in: query
        name: token
        schema:
          type: string
        description: Raw verification token from email link
        required: true
      tags:
      - Auth — Email Verification
      security:
      - BearerAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
        '400':
          description: No response body
  /api/v1/auth/verify-email/resend/:
    post:
      operationId: auth_verify_email_resend_create
      description: Rate-limited (once per 2 minutes). Always returns 200 to avoid
        email enumeration.
      summary: Resend verification email
      tags:
      - Auth — Email Verification
      requestBody:
        content:
          application/json:
            schema:
              $ref: '
          multipart/form-data:
            schema:
              $ref: '
        required: true
      security:
      - BearerAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
          description: ''
components:
  schemas:
    ActiveSession:
      type: object
      description: For listing active refresh token sessions.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        device_name:
          type: string
          nullable: true
          maxLength: 200
        ip_address:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        expires_at:
          type: string
          format: date-time
      required:
      - created_at
      - expires_at
      - id
      - ip_address
    ChangePassword:
      type: object
      properties:
        old_password:
          type: string
          writeOnly: true
        new_password:
          type: string
          writeOnly: true
          maxLength: 128
          minLength: 8
      required:
      - new_password
      - old_password
    EmailResend:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
      - email
    Login:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    Logout:
      type: object
      properties:
        refresh_token:
          type: string
      required:
      - refresh_token
    PasswordResetConfirm:
      type: object
      properties:
        token:
          type: string
        new_password:
          type: string
          writeOnly: true
          maxLength: 128
          minLength: 8
      required:
      - new_password
      - token
    PasswordResetRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
      - email
    PatchedUserProfileUpdate:
      type: object
      description: PATCH /me/ — update UserInfo fields via nested write.
      properties:
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        phone:
          type: string
          nullable: true
          maxLength: 20
        bio:
          type: string
          nullable: true
          maxLength: 1000
        date_of_birth:
          type: string
          format: date
          nullable: true
    PatchedUserSettings:
      type: object
      properties:
        language:
          type: string
          maxLength: 10
        timezone:
          type: string
          maxLength: 50
        notify_email:
          type: boolean
        notify_telegram:
          type: boolean
        notify_web:
          type: boolean
        notify_deadlines:
          type: boolean
        notify_grades:
          type: boolean
        notify_mentor_comments:
          type: boolean
        updated_at:
          type: string
          format: date-time
          readOnly: true
    Register:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          writeOnly: true
          maxLength: 128
          minLength: 8
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
      required:
      - email
      - first_name
      - last_name
      - password
    TokenRefresh:
      type: object
      properties:
        refresh_token:
          type: string
      required:
      - refresh_token
    TokenResponse:
      type: object
      description: Schema only — used by drf-spectacular @extend_schema.
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
      required:
      - access_token
      - refresh_token
      - token_type
    UserInfo:
      type: object
      properties:
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        avatar_url:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
          maxLength: 20
        bio:
          type: string
          nullable: true
          maxLength: 1000
        date_of_birth:
          type: string
          format: date
          nullable: true
        telegram_id:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
          nullable: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - updated_at
    UserProfile:
      type: object
      description: Full authenticated-user profile. No sensitive fields.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          maxLength: 254
        is_active:
          type: boolean
        is_blocked:
          type: boolean
        last_login_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        info:
          allOf:
          - $ref: '
          readOnly: true
        settings:
          allOf:
          - $ref: '
          readOnly: true
        roles:
          type: string
          readOnly: true
      required:
      - created_at
      - email
      - id
      - info
      - roles
      - settings
    UserSettings:
      type: object
      properties:
        language:
          type: string
          maxLength: 10
        timezone:
          type: string
          maxLength: 50
        notify_email:
          type: boolean
        notify_telegram:
          type: boolean
        notify_web:
          type: boolean
        notify_deadlines:
          type: boolean
        notify_grades:
          type: boolean
        notify_mentor_comments:
          type: boolean
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - updated_at
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
tags:
- name: Auth
  description: Login, logout, registration, token refresh
- name: Auth — Email Verification
  description: Email confirmation flow
- name: Auth — Password Reset
  description: Password reset flow
- name: User — Profile
  description: Current user profile and password
- name: User — Settings
  description: Notification & UI preferences
- name: User — Sessions
  description: Active session management
