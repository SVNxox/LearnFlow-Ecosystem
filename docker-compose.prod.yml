








version: '3.9'

services:
  
  
  
  db:
    image: postgres:16-alpine
    container_name: learnflow-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - learnflow-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  
  
  
  redis:
    image: redis:7-alpine
    container_name: learnflow-redis-prod
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - learnflow-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  
  
  
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: learnflow:prod
    container_name: learnflow-web-prod
    restart: unless-stopped
    entrypoint: ["/app/entrypoint.sh"]
    command: >
      gunicorn learnflow.wsgi:application
      --bind 0.0.0.0:8000
      --workers 4
      --threads 2
      --worker-class gthread
      --worker-tmp-dir /dev/shm
      --timeout 60
      --graceful-timeout 30
      --keep-alive 5
      --max-requests 1000
      --max-requests-jitter 50
      --access-logfile -
      --error-logfile -
      --log-level info
      --capture-output
    env_file:
      - .env.production
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./logs:/app/logs
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - learnflow-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  
  
  # ─────────────────────────────────────────────────────────────────────────
  worker-default:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: learnflow:prod
    container_name: learnflow-worker-default
    restart: unless-stopped
    command: >
      celery -A learnflow worker
      --loglevel=info
      --queues=default
      --concurrency=4
      --max-tasks-per-child=100
      --time-limit=300
      --soft-time-limit=240
    env_file:
      - .env.production
    volumes:
      - media_volume:/app/media
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - learnflow-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────────────────
  # Celery Worker (email queue)
  # ─────────────────────────────────────────────────────────────────────────
  worker-email:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: learnflow:prod
    container_name: learnflow-worker-email
    restart: unless-stopped
    command: >
      celery -A learnflow worker
      --loglevel=info
      --queues=email
      --concurrency=2
      --max-tasks-per-child=50
      --time-limit=120
      --soft-time-limit=90
    env_file:
      - .env.production
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - learnflow-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────────────────
  # Celery Worker (notifications queue)
  # ─────────────────────────────────────────────────────────────────────────
  worker-notifications:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: learnflow:prod
    container_name: learnflow-worker-notifications
    restart: unless-stopped
    command: >
      celery -A learnflow worker
      --loglevel=info
      --queues=notifications
      --concurrency=2
      --max-tasks-per-child=50
      --time-limit=120
      --soft-time-limit=90
    env_file:
      - .env.production
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - learnflow-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────────────────
  # Celery Beat (Scheduler)
  # ─────────────────────────────────────────────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: learnflow:prod
    container_name: learnflow-beat
    restart: unless-stopped
    command: >
      celery -A learnflow beat
      --loglevel=info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - learnflow-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────────────────
  # MinIO (S3-compatible Object Storage)
  # ─────────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: learnflow-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - learnflow-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────────────────
  # Nginx (Reverse Proxy + Static Files)
  # ─────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: learnflow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - web
    networks:
      - learnflow-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

# ═══════════════════════════════════════════════════════════════════════════
# Networks
# ═══════════════════════════════════════════════════════════════════════════
networks:
  learnflow-network:
    driver: bridge

# ═══════════════════════════════════════════════════════════════════════════
# Volumes (persistent data)
# ═══════════════════════════════════════════════════════════════════════════
volumes:
  postgres_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  minio_data:
    driver: local
